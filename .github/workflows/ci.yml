# INC-7 -- Fabric autonomous incident commander, run 2026-07-14.
#
# WHY THIS EXISTS
#
# This repo already carries a real, passing, 10-test regression suite on `main`
# (`test/session.test.js`, merged in PR #3). Its mutation check provably fails
# on the INC-1 cold-cache auth defect. But NOTHING EXECUTED IT: no workflow file
# existed in this repo, so the guard was dead code.
#
# That is precisely how INC-1 reached production. PR #1 ("perf: cache session
# lookups") changed `refreshAccessToken()` to read `session.auth.refreshToken`
# directly while adding a cold-cache resume path that yields `auth: null` --
# and it merged with no test executing against the path it changed.
#
# A guard that never runs is decoration. This workflow makes it bite.
#
# No production source is touched by this change. No dependency is added: the
# suite is zero-dependency (node:test), so there is nothing to install.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run the session regression suite
        run: npm test
