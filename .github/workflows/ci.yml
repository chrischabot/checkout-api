# Fabric autonomous incident commander - INC-9 (run 2026-07-11).
#
# WHY THIS EXISTS
#
# This repo already carries a real, passing, 10-test regression suite on `main`
# (`test/session.test.js`, merged in PR #3). Its assertions provably fail on the
# INC-1 cold-cache auth defect - the commander re-verified that this run by
# reintroducing the defect and watching the suite go red.
#
# But NOTHING EXECUTED IT. No workflow file existed in this repo, so the guard
# was dead code: a regression test that never runs is decoration.
#
# That is precisely how INC-1 reached production. PR #1 ("perf: cache session
# lookups") changed `refreshAccessToken()` to read `session.auth.refreshToken`
# directly while adding a cold-cache resume path that yields `auth: null`, and
# it merged with no test executing against the path it changed.
#
# Every incident this fleet has produced followed the same shape: a PR changed a
# code path that no test executed. This workflow closes that hole for the one
# repo that already has the guard written.
#
# SAFETY: no production source is touched. No dependency is added - the suite is
# zero-dependency (`node:test`), so there is nothing to install.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: session regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the session regression suite
        run: npm test

      # INC-12 (Fabric autonomous incident commander).
      #
      # `npm test` above proves the suite is GREEN today. It CANNOT prove the
      # suite would go RED if someone reintroduced the INC-1 cold-cache auth
      # defect -- or quietly thinned the assertions that catch it. Only the
      # mutation-witness verifier proves the guard still has teeth.
      #
      # That verifier has been merged on `main` since PR #3 and NOTHING
      # EXECUTED IT. This workflow ran `npm test` and stopped. That is the
      # INC-9 finding -- "a regression test that never runs is decoration" --
      # reproduced one level up, ON THE GATE ITSELF.
      #
      # The sibling repos already run their verifiers as CI steps
      # (fabric-ic-incident-target, and fabric-gateway-demo via INC-10).
      # checkout-api was the last repo where the gate was dead code.
      #
      # SAFETY: no production source is touched. The verifier mutates
      # session.js in a TEMP COPY only, and asserts the real file's sha256 is
      # unchanged afterwards.
      - name: Set up Python (for the incident verification gates)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run the INC-9 mutation-witness gate (proves the suite bites)
        run: python3 artifacts/incident/verify_inc9_ci_gate.py

      - name: Run the INC-12 divergence gate (proves the step above is not redundant)
        run: python3 artifacts/incident/verify_inc12_ci_runs_verifier.py

      # INC-15 (Fabric autonomous incident commander).
      #
      # The INC-9 verifier's cross-fleet gates (G6a/G6b/G6c) re-confirm, BY
      # EXECUTING THE DEPLOYED SOURCE, that the three owner-blocked billing
      # defects (INC-6/INC-5/INC-8) are still live. Its sibling discovery looked
      # for directories named `incident-target/` and `gateway/`; the real repos
      # are `fabric-ic-incident-target` and `fabric-gateway-demo`. The lookup
      # never matched in ANY environment, so those three gates were unreachable
      # dead code -- and the skip path folded them into a confident "6/6 passed".
      #
      # A skip laundered into a pass count is worse than a missing check: it
      # asserts coverage it does not have. This step guards the repair, so the
      # INC-15 fix cannot itself rot into decoration.
      #
      # NOTE on the bare checkout: CI clones only this repo, so the sibling
      # fleet repos are legitimately absent here. The verifier is
      # environment-aware -- its cross-fleet gates report SKIPPED (never a pass,
      # never a hard failure) in that case, so this step is NOT permanently red.
      # That was the INC-11 bug and is deliberately not re-committed.
      - name: Run the INC-15 cross-fleet discovery gate (a skip must never count as a pass)
        run: python3 artifacts/incident/verify_inc15_cross_fleet_discovery.py

      # INC-17 (Fabric autonomous incident commander).
      #
      # The INC-15 verifier's G6 NEGATIVE CONTROL asserted the nested INC-9
      # verifier's tally had a denominator of literally six:
      #
      #     no_phantom_passes = bool(lm) and int(lm.group(2)) == 6
      #
      # That is a MERGE-TIME FACT frozen into a PERMANENT GATE. Add one ordinary
      # gate to verify_inc9_ci_gate.py and the tally becomes 7/7, so G6 goes RED
      # -- in CI -- while nothing is actually wrong. It punished the next
      # contributor for extending the gate surface, which is the behaviour we
      # WANT. That is the INC-11/INC-12 expired-precondition bug, committed
      # inside the verifier written to police exactly this habit.
      #
      # G6 now asserts the INVARIANT instead of the constant: the denominator
      # counts exactly the gates that EXECUTED, and a SKIPPED gate is in neither
      # the numerator nor the denominator. Count-independent, so the gate surface
      # can grow freely -- while a laundered skip is still caught (INC-17 G4).
      #
      # This step guards that repair, so it cannot rot back into a hardcoded
      # count. It needs no sibling repos: every INC-17 gate runs on a bare
      # checkout, so it is green in the job that runs it and never permanently red.
      - name: Run the INC-17 gate-count-invariant gate (a meta-gate must not expire)
        run: python3 artifacts/incident/verify_inc17_gate_count_invariant.py
