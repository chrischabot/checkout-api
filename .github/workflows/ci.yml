# Fabric autonomous incident commander - INC-9 (run 2026-07-11).
#
# WHY THIS EXISTS
#
# This repo already carries a real, passing, 10-test regression suite on `main`
# (`test/session.test.js`, merged in PR #3). Its assertions provably fail on the
# INC-1 cold-cache auth defect - the commander re-verified that this run by
# reintroducing the defect and watching the suite go red.
#
# But NOTHING EXECUTED IT. No workflow file existed in this repo, so the guard
# was dead code: a regression test that never runs is decoration.
#
# That is precisely how INC-1 reached production. PR #1 ("perf: cache session
# lookups") changed `refreshAccessToken()` to read `session.auth.refreshToken`
# directly while adding a cold-cache resume path that yields `auth: null`, and
# it merged with no test executing against the path it changed.
#
# Every incident this fleet has produced followed the same shape: a PR changed a
# code path that no test executed. This workflow closes that hole for the one
# repo that already has the guard written.
#
# SAFETY: no production source is touched. No dependency is added - the suite is
# zero-dependency (`node:test`), so there is nothing to install.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: session regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the session regression suite
        run: npm test

      # INC-12 (Fabric autonomous incident commander).
      #
      # `npm test` above proves the suite is GREEN today. It CANNOT prove the
      # suite would go RED if someone reintroduced the INC-1 cold-cache auth
      # defect -- or quietly thinned the assertions that catch it. Only the
      # mutation-witness verifier proves the guard still has teeth.
      #
      # That verifier has been merged on `main` since PR #3 and NOTHING
      # EXECUTED IT. This workflow ran `npm test` and stopped. That is the
      # INC-9 finding -- "a regression test that never runs is decoration" --
      # reproduced one level up, ON THE GATE ITSELF.
      #
      # The sibling repos already run their verifiers as CI steps
      # (fabric-ic-incident-target, and fabric-gateway-demo via INC-10).
      # checkout-api was the last repo where the gate was dead code.
      #
      # SAFETY: no production source is touched. The verifier mutates
      # session.js in a TEMP COPY only, and asserts the real file's sha256 is
      # unchanged afterwards.
      - name: Set up Python (for the incident verification gates)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run the INC-9 mutation-witness gate (proves the suite bites)
        run: python3 artifacts/incident/verify_inc9_ci_gate.py

      - name: Run the INC-12 divergence gate (proves the step above is not redundant)
        run: python3 artifacts/incident/verify_inc12_ci_runs_verifier.py

      # INC-15 (Fabric autonomous incident commander).
      #
      # The INC-9 verifier's cross-fleet gates (G6a/G6b/G6c) re-confirm, BY
      # EXECUTING THE DEPLOYED SOURCE, that the three owner-blocked billing
      # defects (INC-6/INC-5/INC-8) are still live. Its sibling discovery looked
      # for directories named `incident-target/` and `gateway/`; the real repos
      # are `fabric-ic-incident-target` and `fabric-gateway-demo`. The lookup
      # never matched in ANY environment, so those three gates were unreachable
      # dead code -- and the skip path folded them into a confident "6/6 passed".
      #
      # A skip laundered into a pass count is worse than a missing check: it
      # asserts coverage it does not have. This step guards the repair, so the
      # INC-15 fix cannot itself rot into decoration.
      #
      # NOTE on the bare checkout: CI clones only this repo, so the sibling
      # fleet repos are legitimately absent here. The verifier is
      # environment-aware -- its cross-fleet gates report SKIPPED (never a pass,
      # never a hard failure) in that case, so this step is NOT permanently red.
      # That was the INC-11 bug and is deliberately not re-committed.
      - name: Run the INC-15 cross-fleet discovery gate (a skip must never count as a pass)
        run: python3 artifacts/incident/verify_inc15_cross_fleet_discovery.py

      # INC-18 (Fabric autonomous incident commander).
      #
      # The INC-9 verifier's cross-fleet gates G6a/G6b/G6c ASSERTED THAT THE
      # OWNER-BLOCKED BILLING DEFECTS WERE STILL BROKEN:
      #
      #     leak == 25_500 and price_blind   /   batch_died   /   silent_null
      #
      # Those are merge-time facts frozen into permanent gates. The instant an
      # owner lands the INC-6/INC-5/INC-8 repair that this commander has escalated
      # for four consecutive runs, the assertions go false and THIS JOB goes hard
      # RED on a repo where nothing is wrong -- for the sole reason that somebody
      # finally did the thing we kept asking them to do. Worse, the INC-5 probe
      # caught only KeyError, so a legitimate reject-loudly repair (raising a
      # custom ValidationError) would have crashed the verifier outright.
      #
      # A gate that PUNISHES THE REMEDIATION IT EXISTS TO REQUEST teaches the team
      # to ignore red CI -- the exact disease this fleet exists to cure. The repair
      # REPORTS defect liveness as provenance and ENFORCES only the policy-free
      # baseline (well-formed input must still price and aggregate correctly),
      # which every candidate owner policy satisfies and the tempting broken
      # repairs do not.
      #
      # This step guards that repair. It is green on a BARE CHECKOUT (6/6, exit 0),
      # so it cannot become the INC-11 permanently-red bug it diagnoses.
      #
      # IMPORTANT -- why this verifier does NOT enforce source hashes:
      # its first draft asserted hardcoded sha256 baselines and anchored its
      # witness to the CURRENTLY deployed source. Both would have hard-reddened
      # THIS JOB the moment an owner repaired a billing file, and the sha gate
      # would additionally have failed every ordinary PR that edits session.js
      # (the INC-12 padlock). Drift is therefore REPORTED, never enforced, and the
      # witness is anchored to a frozen snapshot of the defect. Verified green in
      # four scenarios: unchanged fleet, bare checkout, owners-repaired-everything,
      # and a normal PR editing session.js.
      - name: Run the INC-18 gate (a gate must never punish the fix it asks for)
        run: python3 artifacts/incident/verify_inc18_gate_punishes_remediation.py

      # INC-19 (Fabric autonomous incident commander).
      #
      # verify_inc15_cross_fleet_discovery.py carried TWO expired preconditions:
      #
      #   1. LAYOUT DEPENDENCE (G4/G5). Both witnessed the OLD-vs-NEW discovery
      #      divergence against the AMBIENT fleet roots. But the OLD lookup searches
      #      for dirs named `incident-target/` and `gateway/` -- so with the siblings
      #      cloned under exactly those LEGACY names the OLD lookup RESOLVES them,
      #      "the old discovery is blind" is FALSE, and both gates go RED. Measured:
      #      real names -> 9/9 exit 0; legacy names -> 7/9 exit 1, on the SAME tree.
      #      The exit code depended on how somebody named their clone directories.
      #      And it was self-contradictory: G3 of that file certifies the legacy
      #      layout as SUPPORTED, then G4/G5 hard-failed on it.
      #
      #   2. COUNT DEPENDENCE (G6). The negative control asserted the nested INC-9
      #      verifier's tally had a denominator of literally six. Add one ordinary
      #      new gate -- the behaviour this fleet wants to ENCOURAGE -- and the
      #      healthy verifier reports 7/7 while that predicate rejects it.
      #
      # Both are this fleet's signature failure: a gate that cannot PASS is exactly
      # as worthless as one that cannot FAIL -- both teach the team to ignore red CI.
      #
      # The repair witnesses blindness on a tree that CAN HOST the witness, and
      # asserts the skip/denominator INVARIANT rather than a constant. Anti-weakening
      # is gated: a laundered skip is STILL caught (a correction, not a relaxation).
      #
      # SAFETY: no production source is touched. On this bare CI checkout the layout
      # witnesses need the sibling SOURCES, so they report SKIPPED (never a pass,
      # never a hard failure) while the static gate still asserts BOTH repairs are
      # present -- so this step cannot become the permanently-red INC-11 bug.
      - name: Run the INC-19 gate (witnesses must not depend on ambient layout or gate counts)
        run: python3 artifacts/incident/verify_inc19_layout_and_count_invariance.py

      # INC-23 (Fabric autonomous incident commander).
      #
      # verify_inc15_cross_fleet_discovery.py gate G8 ("NO PRODUCTION DRIFT")
      # required every deployed source to be byte-identical to a HARDCODED sha256
      # baseline, and was FATAL on any difference. That baseline dict includes the
      # SIBLING billing sources (usage_aggregator.py, checkout.py).
      #
      # So the moment an owner landed the correct INC-6 repair -- the one this
      # commander has escalated for many consecutive runs -- `checkout.py` changed
      # bytes and G8 went hard RED on a repo where NOTHING WAS WRONG. Reproduced by
      # execution on the correctly-repaired tree: INC-15 -> exit 1 [FAIL] G8, and
      # INC-19 -> exit 1 [FAIL] G1 (it merely re-runs the INC-15 verifier, so it
      # inherited the failure). One root cause, two red gates. It ALSO padlocked
      # this repo's own session.js: any legitimate future edit reddened CI, which is
      # the INC-12 bug re-committed.
      #
      # THE REPAIR: assert the INVARIANT, not the CALENDAR. What G8 legitimately
      # protects is the verifier's OWN side effects -- it mutates files during
      # mutation testing and must restore every one. G8 now compares a start-of-run
      # SNAPSHOT against the bytes on disk at the end:
      #
      #   bytes moved DURING OUR OWN RUN          -> FATAL (still bites)
      #   differs from the recorded reference but
      #     STABLE across our run = an OWNER EDIT -> PROVENANCE, never fatal
      #
      # This step guards that repair. Its G0 gate is STATIC and needs no siblings,
      # so it is green on a bare checkout (which is all CI clones) while still going
      # RED if the repair is stripped -- it cannot become the permanently-red INC-11
      # bug it diagnoses. The behavioural witnesses report SKIPPED here (never a
      # pass, never a hard failure).
      #
      # Anti-weakening is gated: simply DELETING G8 would also have turned the red
      # gate green, and it FAILS the INC-23 G5 witness. Correction, not cover-up.
      - name: Run the INC-23 gate (the drift gate must not punish an owner's billing repair)
        run: python3 artifacts/incident/verify_inc23_drift_gate_punishes_owner_fix.py
