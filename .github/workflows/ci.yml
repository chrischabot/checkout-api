# Fabric autonomous incident commander - INC-9 (run 2026-07-11).
#
# WHY THIS EXISTS
#
# This repo already carries a real, passing, 10-test regression suite on `main`
# (`test/session.test.js`, merged in PR #3). Its assertions provably fail on the
# INC-1 cold-cache auth defect - the commander re-verified that this run by
# reintroducing the defect and watching the suite go red.
#
# But NOTHING EXECUTED IT. No workflow file existed in this repo, so the guard
# was dead code: a regression test that never runs is decoration.
#
# That is precisely how INC-1 reached production. PR #1 ("perf: cache session
# lookups") changed `refreshAccessToken()` to read `session.auth.refreshToken`
# directly while adding a cold-cache resume path that yields `auth: null`, and
# it merged with no test executing against the path it changed.
#
# Every incident this fleet has produced followed the same shape: a PR changed a
# code path that no test executed. This workflow closes that hole for the one
# repo that already has the guard written.
#
# SAFETY: no production source is touched. No dependency is added - the suite is
# zero-dependency (`node:test`), so there is nothing to install.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: session regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the session regression suite
        run: npm test

      # INC-11 (Fabric autonomous incident commander).
      #
      # `npm test` above proves the suite is GREEN today. It cannot prove the
      # suite would go RED if someone reintroduced the INC-1 cold-cache auth
      # defect — or quietly gutted the assertions that catch it. Only the
      # mutation-witness verifier proves the guard still has teeth.
      #
      # That verifier was merged to `main` in PR #3 and NOTHING EXECUTED IT:
      # exactly the INC-9 finding ("a regression test that never runs is
      # decoration") reproduced one level up, on the gate itself. It was also
      # permanently red — its G3 asserted ci.yml did not yet exist upstream —
      # so it could not have been wired in without the repair in this same
      # change. Both halves ship together, by necessity.
      - name: Set up Python (for the incident verification gate)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run the INC-9 mutation-witness gate (proves the suite bites)
        run: python3 artifacts/incident/verify_inc9_ci_gate.py
